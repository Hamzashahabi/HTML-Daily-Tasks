<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="day8.css">
</head>
<body>
    <div class="form-container">
        <h3>Register</h3>
        <form>
        <h5>Full Name</h5>
        <input type="text" placeholder="Name" >
        <br><br>
        <h5>Email</h5>
        <input type="email" placeholder="yourname@ac.in">
        <br><br>
        <h5>Password</h5>
        <input type="password" placeholder="Password">
        <br><br>
        <h5>Phone Number</h5>
        <input type="phone number" placeholder="+91XXXXXXXXXX">
        <br><br>
        <h5>Gender</h5>
        <select name="gender" id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>
        <br><br>
        <h5>City</h5>
        <select name="city" id="city">
            <option value="agra">Agra</option>
            <option value="delhi">Delhi</option>
            <option value="alwar">Alwar</option>
            <option value="mumbai">Mumbai</option>
            <option value="chennai">Chennai</option>
            <option value="banglore">Banglore</option>
            <option value="kolkata">Kolkata</option>
            <option value="ghaziabad">Ghaziabad</option>
            <option value="jaipur">Jaipur</option>
        </select>
        <br><br>
        <input type="checkbox"  name="termsandcondition">I agree to Terms & Conditions
        <br><br>
        <button type="Register">Register</button>
        <p>Already have an account?<a href="day9.html">Login Here</a></p>
    </form>
    </div>
</body>
</html>
